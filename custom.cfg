# ============================================================================
# custom.cfg — exec'd from the bottom of the recipe-generated server.cfg.
#
# This file is the entry point for everything in the custom layer. Keep it
# free of secrets — real credentials, license keys, and API tokens belong in
# txAdmin's secret-managed config, never in version control.
# ============================================================================

# ---------------------------------------------------------------------------
# Convars (server-side configuration knobs)
# ---------------------------------------------------------------------------
# Uncomment and tune as needed. Examples:
# setr server_base:debug false
# set   server_base:locale "en"
# sets  server_base:discord "https://discord.gg/CHANGEME"

# ---------------------------------------------------------------------------
# Custom resources
# ---------------------------------------------------------------------------
# Order matters: server_identity owns the loading screen and must start
# before the player ever finishes joining. server_base owns commands and
# the welcome notification and depends only on qbx_core + ox_lib.

ensure server_identity
ensure server_base

# ---------------------------------------------------------------------------
# ACE permissions for custom commands
# ---------------------------------------------------------------------------
# /coords (defined in server_base) is restricted. Grant it to your admin
# group here. The principal mapping lives in the recipe-generated
# server.cfg (see server.cfg.example for the pattern).
add_ace group.admin command.coords allow
